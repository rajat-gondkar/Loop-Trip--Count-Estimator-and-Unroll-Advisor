<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Loop Unroll Advisor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <main class="app-shell">
      <section class="toolbar">
        <div>
          <h1>Loop Unroll Advisor</h1>
          <p>Analyze C loops with LLVM ScalarEvolution and get unroll recommendations.</p>
        </div>
        <div class="toolbar-actions">
          <div class="strategy-selector">
            <label for="strategySelect">Optimization Strategy</label>
            <select id="strategySelect">
              <option value="conservative">Conservative (4, 16)</option>
              <option value="balanced" selected>Balanced (8, 32)</option>
              <option value="aggressive">Aggressive (16, 64)</option>
            </select>
          </div>
          <button id="loadTestsButton" class="secondary-button" type="button">Run 6 Tests</button>
          <button id="analyzeButton" type="button">Analyze Loops</button>
        </div>
      </section>

      <section class="workspace">
        <div class="editor-panel">
          <label for="codeInput">C Source</label>
          <div class="code-editor">
            <pre id="lineNumbers" aria-hidden="true">1</pre>
            <textarea id="codeInput" spellcheck="false">void showcase_strategies(int *arr, int matrix[32][32]) {
  for (int i = 0; i < 4; i++) {
    arr[i] = i * 2;
  }

  for (int i = 0; i < 6; i++) {
    arr[i] = i + 10;
  }

  for (int i = 0; i < 12; i++) {
    arr[i] = i * 3;
  }

  for (int i = 0; i < 20; i++) {
    arr[i] = arr[i] + 5;
  }

  for (int i = 0; i < 40; i++) {
    arr[i] = i << 2;
  }

  for (int i = 0; i < 100; i++) {
    arr[i] = arr[i] * arr[i];
  }
}</textarea>
          </div>
        </div>

        <div class="results-panel">
          <div class="results-header">
            <h2>Results</h2>
            <div class="results-meta">
              <span id="strategyInfo" class="strategy-info"></span>
              <span id="statusText">Ready</span>
            </div>
          </div>
          <div id="errorBox" class="error" hidden></div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Loop Location</th>
                  <th>Trip Count</th>
                  <th>Classification</th>
                  <th>Recommendation</th>
                  <th>Rationale</th>
                </tr>
              </thead>
              <tbody id="resultsBody">
                <tr class="empty-row">
                  <td colspan="5">Run an analysis to see loop recommendations.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
